<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #FF4B7B; --navy: #22224C; --bg: #F7F7FB;
    --white: #fff; --border: #E0E0EE; --text: #22224C;
    --muted: #888; --ok: #22C55E;
  }
  body { font-family: 'Futura', 'Century Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--navy); color: white; padding: 20px 24px; }
  header h1 { font-size: 18px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
  header p { font-size: 12px; opacity: .6; margin-top: 2px; }
  .pink { color: var(--pink); }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .card { background: var(--white); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
  .card h2 { font-size: 14px; font-weight: 900; letter-spacing: .06em; text-transform: uppercase; color: var(--navy); margin-bottom: 16px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 10px; border: none; font-family: inherit; font-weight: 800; font-size: 14px; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--pink); color: white; }
  .btn-navy { background: var(--navy); color: white; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .status { padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
  .status.info { background: #EEF2FF; color: var(--navy); }
  .status.ok { background: #F0FDF4; color: #166534; }
  .status.error { background: #FEF2F2; color: #991B1B; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--white); border-radius: 12px; padding: 16px; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-size: 28px; font-weight: 900; color: var(--pink); }
  .stat-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--navy); color: white; padding: 10px 12px; text-align: left; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  .badge-sent { background: #F3F4F6; color: #6B7280; }

<header>
  <h1>FUNKY DORY <span class="pink">·</span> RF QR TOOL</h1>
  <p>Remenham Farm ticket QR code manager · HRR 2026 · LIVE</p>
</header>

<div class="container">

  <div class="card">
    <h2>Step 1 — Load Data</h2>

      <div class="stat"><div class="stat-num" id="stat-events">0</div><div class="stat-label">Events</div></div>

      <h2>New Tickets — Ready to Send</h2>

      <div class="actions">
        <button class="btn btn-primary" id="gen-btn" onclick="generatePDFs()">
          <span id="gen-spinner" style="display:none" class="spinner"></span>
          ⬇ Generate PDF Tickets &amp; Mark as Sent

      <div id="gen-progress" style="display:none;margin-top:12px;">

      </div>

    <div class="card">
      <h2>All Tickets</h2>
      <div id="all-table-wrap"></div>
    </div>
  </div>

</div>

<script>
const SHEET_ID = '1qy9_HFxFZg9L3M2UzV_cSMesZp6UdYJZmlR-k9d3OCc';
const RF_GID = '630690329';
const APP_URL = 'https://lnavarro-fd.github.io/FDSCAN-LIVE';

let allTickets = [];
let sentIds = new Set();

function qrUrl(itemId) {
  return `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(APP_URL + '?rf=' + itemId)}&size=400x400&margin=10`;
}

function eventName(itemName) {
  const n = (itemName || '').toLowerCase();
  if (n.includes('ibiza') || n.includes('white party') || n.includes('friday')) return 'Ibiza White Party — Friday 3 July 2026';
  if (n.includes('studio 54') || n.includes('saturday')) return 'Studio 54 — Saturday 4 July 2026';
  if (n.includes('brunch')) return 'Brunch on the Banks — Saturday 4 July 2026';
  if (n.includes('ladies') || n.includes('thursday')) return 'Ladies Day — Thursday 2 July 2026';
  return itemName;
}

async function fetchCSV(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Sheet fetch failed: ${r.status}`);
  const text = await r.text();
  return text.split('\n').map(row => {
    const cells = []; let inQ = false, cell = '';
    for (const ch of row) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ''; continue; }
      cell += ch;
    }
    cells.push(cell.trim()); return cells;
  });
}

async function loadFirebaseSent() {
  if (!window._fb) return;
  try {
    const snap = await window._fb.get(window._fb.child(window._fb.ref(window._fb.db), 'rfIssued'));
    if (snap.exists()) {
      Object.keys(snap.val()).forEach(id => sentIds.add(String(id)));
    }
  } catch(e) { console.warn('Firebase rfIssued load failed:', e.message); }
}

async function loadData() {
  const btn = document.getElementById('load-btn');
  const spinner = document.getElementById('load-spinner');
  btn.disabled = true; spinner.style.display = 'inline-block';
  document.getElementById('load-status').className = 'status info';
  document.getElementById('load-status').textContent = 'Loading...';

  try {
    await loadFirebaseSent();
    const rfRows = await fetchCSV(RF_GID);
    const dataRows = rfRows.slice(1).filter(r => r[0] && r[16]);

    allTickets = dataRows.map(r => ({
      itemId:    (r[38] || '').trim(),
      orderId:   (r[0]  || '').trim(),
      firstName: (r[16] || '').trim(),
      lastName:  (r[17] || '').trim(),
      name:      [(r[16]||'').trim(), (r[17]||'').trim()].filter(Boolean).join(' '),
      email:     (r[20] || '').trim().toLowerCase(),
      itemName:  (r[40] || '').trim(),
    })).filter(t => t.itemId && t.name && t.email);

    renderResults();

    const newCount = allTickets.filter(t => !sentIds.has(t.itemId)).length;
    document.getElementById('load-status').className = 'status ok';
    document.getElementById('load-status').textContent = `✓ Loaded ${allTickets.length} tickets. ${sentIds.size} already sent. ${newCount} new.`;

  } catch(e) {
    document.getElementById('load-status').className = 'status error';
    document.getElementById('load-status').textContent = `Error: ${e.message}`;
  }
  btn.disabled = false; spinner.style.display = 'none';
}

function renderResults() {
  const newTickets = allTickets.filter(t => !sentIds.has(t.itemId));

  document.getElementById('stat-total').textContent = allTickets.length;
  document.getElementById('stat-new').textContent = newTickets.length;
  document.getElementById('stat-sent').textContent = sentIds.size;
  const events = new Set(allTickets.map(t => eventName(t.itemName)));
  document.getElementById('stat-events').textContent = events.size;
  document.getElementById('stats-section').style.display = '';
  document.getElementById('results-section').style.display = '';

  document.getElementById('new-status').textContent = newTickets.length > 0
    ? `${newTickets.length} new tickets ready — click Generate to create PDFs and mark as sent.`
    : 'All tickets have been sent — nothing new.';

  document.getElementById('new-table-wrap').innerHTML = newTickets.length > 0 ? `
    <table>
      <thead><tr><th>QR</th><th>Name</th><th>Email</th><th>Event</th></tr></thead>
      <tbody>${newTickets.map(t => `
        <tr>
          <td><img class="qr-thumb" src="${qrUrl(t.itemId)}" alt="QR"></td>
          <td><strong>${t.name}</strong></td>
          <td>${t.email}</td>
          <td style="font-size:12px">${eventName(t.itemName)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No new tickets to send.</div>';

  document.getElementById('all-table-wrap').innerHTML = `
    <table>
      <thead><tr><th>Status</th><th>Name</th><th>Email</th><th>Event</th></tr></thead>
      <tbody>${allTickets.map(t => `
        <tr>
          <td>${sentIds.has(t.itemId) ? '<span class="badge badge-sent">Sent</span>' : '<span class="badge badge-new">New</span>'}</td>
          <td><strong>${t.name}</strong></td>
          <td>${t.email}</td>
          <td style="font-size:12px">${eventName(t.itemName)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  document.getElementById('gen-btn').disabled = newTickets.length === 0;
}

async function loadImageAsBase64(url) {
  const r = await fetch(url);
  const blob = await r.blob();
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

      doc.addImage(logoData, 'PNG', W/2 - 50, 12, 100, 36);

      // Pink divider
      doc.setFillColor(255, 75, 123);
      doc.rect(0, 60, W, 3, 'F');

      // ENTRY TICKET label
      doc.setFillColor(247, 247, 251);
      doc.rect(0, 63, W, 20, 'F');
      doc.setTextColor(34, 34, 76);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.text('ENTRY TICKET', W / 2, 76, { align: 'center' });

      // Guest name
      doc.setFontSize(22);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(34, 34, 76);
      doc.text(t.name, W / 2, 105, { align: 'center' });

      // Event name
      doc.setFontSize(13);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(255, 75, 123);
      doc.text(eventName(t.itemName), W / 2, 118, { align: 'center' });

      // Date
      doc.setFontSize(11);
      doc.setTextColor(100, 100, 120);
      const eDates = {'Ladies Day':'Thursday 2nd July 2026','Ibiza White Party':'Friday 3rd July 2026','Studio 54':'Saturday 4th July 2026','Brunch on the Banks':'Saturday 4th July 2026'};
      doc.text(eDates[eventName(t.itemName)] || 'July 2026', W / 2, 130, { align: 'center' });

      // QR code
      const qrData = await loadImageAsBase64(qrUrl(t.itemId));
      const qrSize = 110;
      const qrX = (W - qrSize) / 2;
      const qrY = 140;
      doc.setFillColor(255, 255, 255);
      doc.roundedRect(qrX - 5, qrY - 5, qrSize + 10, qrSize + 10, 4, 4, 'F');
      doc.setDrawColor(230, 230, 240);
      doc.roundedRect(qrX - 5, qrY - 5, qrSize + 10, qrSize + 10, 4, 4, 'S');
      doc.addImage(qrData, 'PNG', qrX, qrY, qrSize, qrSize);

      // Instructions
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(34, 34, 76);
      doc.text('Show this QR code at the door', W / 2, qrY + qrSize + 18, { align: 'center' });
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(120, 120, 140);
      doc.text('Our door team will scan you in · Remenham Farm booking', W / 2, qrY + qrSize + 28, { align: 'center' });

      // Footer
      doc.setFillColor(34, 34, 76);
      doc.rect(0, H - 18, W, 18, 'F');
      doc.setFillColor(255, 75, 123);
      doc.rect(0, H - 18, W, 2, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.text('funkydorylove.co.uk  ·  @funkydorylove  ·  Chic by Tradition, Funky by Nature', W / 2, H - 7, { align: 'center' });
      const pdfBytes = doc.output('arraybuffer');
      const safeName = t.name.replace(/[^a-z0-9]/gi, '_');
      zip.file(`RF_Ticket_${safeName}.pdf`, pdfBytes);

    } catch(e) {
      console.warn(`Failed for ${t.name}:`, e.message);
    }
  }

  progressText.textContent = 'Saving to Firebase and preparing download...';

  // Mark all as sent in Firebase
  if (window._fb) {
    const today = new Date().toISOString().slice(0, 10);
    for (const t of newTickets) {
      try {
        await window._fb.set(
          window._fb.ref(window._fb.db, `rfIssued/${t.itemId}`),
          { name: t.name, email: t.email, event: eventName(t.itemName), sentDate: today, qrUrl: qrUrl(t.itemId) }
        );
        sentIds.add(t.itemId);
      } catch(e) { console.warn('Firebase write failed:', e.message); }
    }
  }

  // Download zip
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `RF_QR_Tickets_${new Date().toISOString().slice(0, 10)}.zip`;
  a.click();

  progressText.textContent = `✓ Done! ${newTickets.length} PDFs downloaded and marked as sent.`;
  progressBar.style.width = '100%';
  btn.disabled = false;
  spinner.style.display = 'none';

  renderResults();
}
