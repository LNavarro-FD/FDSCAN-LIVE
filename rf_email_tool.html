<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD HRR 2026 — RF Additional Tickets Email Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f7;color:#22224C}
header{background:#22224C;padding:16px 24px}
header h1{color:white;font-size:15px;font-weight:700}
header p{color:rgba(255,255,255,.6);font-size:12px;margin-top:2px}
.wrap{max-width:800px;margin:20px auto;padding:0 16px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e0e0ee}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-block}
.btn-pink{background:#FF4B7B;color:white}
.btn-navy{background:#22224C;color:white}
.btn-green{background:#f0fdf4;border:1px solid #aad9b0;color:#1a5e24}
.btn:disabled{opacity:.4;cursor:not-allowed}
.status{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin:12px 0}
.ok{background:#f0fdf4;color:#166534}
.info{background:#eef2ff;color:#22224C}
.error{background:#fef2f2;color:#991B1B}
.row{background:white;border:1px solid #e0e0ee;border-radius:10px;padding:16px;margin-bottom:10px}
.row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.name{font-weight:700;font-size:15px}
.meta{font-size:12px;color:#888;margin-top:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#FFE4E6;color:#9F1239;margin-left:6px}
.badge-sent{background:#f0fdf4;color:#166534}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.preview{background:#f9f9fb;border:1px solid #e0e0ee;border-radius:8px;padding:12px;margin-top:10px;font-size:13px;white-space:pre-wrap;line-height:1.6;display:none}
.attach{background:#fff9db;border:1px solid #f0d060;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>
<header>
  <h1>FUNKY DORY · RF Additional Tickets Email Tool</h1>
  <p>Send apology emails with additional QR codes for multi-ticket bookings</p>
</header>
<div class="wrap">
  <div class="card">
    <button class="btn btn-pink" id="loadBtn">Load RF Attendees</button>
    <div id="status" class="status info" style="display:none"></div>
  </div>
  <div id="list"></div>
</div>

<script>
var SHEET_ID = '1qy9_HFxFZg9L3M2UzV_cSMesZp6UdYJZmlR-k9d3OCc';
var RF_GID = '630690329';
var FB_URL = 'https://funky-dory-fdscan-default-rtdb.europe-west1.firebasedatabase.app';

var bookings = [];
var sentKeys = {};

function evtName(s) {
  var n = (s||'').toLowerCase();
  if (n.indexOf('ibiza') > -1 || n.indexOf('white party') > -1) return 'Ibiza White Party';
  if (n.indexOf('studio 54') > -1) return 'Studio 54';
  if (n.indexOf('brunch') > -1) return 'Brunch on the Banks';
  if (n.indexOf('ladies') > -1) return 'Ladies Day';
  return s;
}
function evtDate(s) {
  var e = evtName(s);
  if (e === 'Ladies Day') return 'Thursday 2nd July 2026';
  if (e === 'Ibiza White Party') return 'Friday 3rd July 2026';
  return 'Saturday 4th July 2026';
}
function theEvt(s) {
  var e = evtName(s);
  return e === 'Ibiza White Party' ? 'the Ibiza White Party' : e;
}

function qrUrl(key) {
  return 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent('https://lnavarro-fd.github.io/FDSCAN-LIVE?rf=' + key) + '&size=150x150&margin=5';
}

function isSent(b) {
  return b.additionalKeys.some(function(k) { return sentKeys[k]; });
}

async function loadFB() {
  try {
    var r = await fetch(FB_URL + '/rfIssued.json');
    if (r.ok) { var d = await r.json(); if (d) sentKeys = d; }
  } catch(e) {}
}

async function saveFB(key, name, evt) {
  try {
    await fetch(FB_URL + '/rfIssued/' + key + '.json', {
      method: 'PUT',
      body: JSON.stringify({name:name, event:evt, sentDate:new Date().toISOString().slice(0,10)})
    });
  } catch(e) { console.warn('FB write failed', e); }
}

async function parseCSV(text) {
  var rows = text.split('\n');
  return rows.map(function(row) {
    var cells = [], inQ = false, cell = '';
    for (var i = 0; i < row.length; i++) {
      var ch = row[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ''; continue; }
      cell += ch;
    }
    cells.push(cell.trim());
    return cells;
  });
}

document.getElementById('loadBtn').onclick = async function() {
  var statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.className = 'status info';
  statusEl.textContent = 'Loading...';
  try {
    await loadFB();
    var r = await fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=' + RF_GID + '&t=' + Date.now());
    var text = await r.text();
    var rows = await parseCSV(text);
    var raw = rows.slice(1).filter(function(r) { return r[0] && r[16]; }).map(function(r) {
      return {
        itemId: (r[38]||'').trim(),
        firstName: (r[16]||'').trim(),
        lastName: (r[17]||'').trim(),
        name: [(r[16]||'').trim(),(r[17]||'').trim()].filter(Boolean).join(' '),
        email: (r[20]||'').trim().toLowerCase(),
        itemName: (r[40]||'').trim(),
        qty: parseInt(r[43]||'1') || 1
      };
    }).filter(function(t) { return t.itemId && t.name && t.email && t.qty > 1; });

    // One booking per person, additional keys only
    bookings = raw.map(function(t) {
      var addKeys = [];
      for (var q = 2; q <= t.qty; q++) addKeys.push(t.itemId + '_' + q);
      return Object.assign({}, t, { additionalKeys: addKeys });
    });

    statusEl.className = 'status ok';
    statusEl.textContent = 'Loaded ' + bookings.length + ' multi-ticket bookings.';
    render();
  } catch(e) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Error: ' + e.message;
  }
};

function render() {
  var el = document.getElementById('list');
  if (!bookings.length) { el.innerHTML = '<div class="card" style="color:#888;text-align:center">No multi-ticket bookings found.</div>'; return; }
  el.innerHTML = bookings.map(function(b, idx) {
    var sent = isSent(b);
    var evt = evtName(b.itemName);
    var date = evtDate(b.itemName);
    var body = 'Dear ' + b.firstName + ',\n\n'
      + 'We recently sent you your entry QR code for ' + theEvt(b.itemName) + ' on ' + date + '.\n\n'
      + 'We realised we only sent one QR code for your booking of ' + b.qty + ' tickets. Please find your additional QR code' + (b.additionalKeys.length > 1 ? 's' : '') + ' attached — each person in your party will need their own code to enter the Funky Dory enclosure. Please keep your original email which contains QR code 1 of ' + b.qty + '.\n\n'
      + 'Please bring your QR code with you — our door team will scan it on arrival.\n\n'
      + 'If you need to book parking, you should pre-book evening parking here:\nhttps://henleyregatta.com/product/evening-parking-pass/\n\n'
      + 'We apologise for any inconvenience and look forward to welcoming you and your guests!';
    var subject = 'Your Additional Entry QR Code' + (b.additionalKeys.length > 1 ? 's' : '') + ' — Funky Dory During Henley Royal Regatta 2026';
    var mailto = 'mailto:' + b.email + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    var pdfList = b.additionalKeys.map(function(k, i) {
      return 'RF_Ticket_' + b.name.replace(/[^a-z0-9]/gi,'_') + '_Ticket_' + (i+2) + '_of_' + b.qty + '.pdf';
    }).join('\n');
    return '<div class="row" id="row-' + idx + '">'
      + '<div class="row-top">'
      + '<div><div class="name">' + b.name + (sent ? '<span class="badge badge-sent">✓ Sent</span>' : '<span class="badge">Needs sending</span>') + '</div>'
      + '<div class="meta">' + b.email + ' · ' + evt + ' · ' + b.qty + ' tickets · ' + b.additionalKeys.length + ' additional QR code' + (b.additionalKeys.length > 1 ? 's' : '') + '</div></div>'
      + '</div>'
      + '<div class="actions">'
      + '<button class="btn btn-navy" onclick="togglePreview(' + idx + ')">✏️ Preview</button>'
      + (sent ? '' : '<a href="' + mailto + '"><button class="btn btn-pink">📧 Open in Mail</button></a>')
      + (sent ? '' : '<button class="btn btn-green" onclick="doMarkSent(' + idx + ')">✓ Mark as Sent</button>')
      + '</div>'
      + '<div class="preview" id="preview-' + idx + '">' + body + '</div>'
      + '<div class="attach" id="attach-' + idx + '">📎 Attach these PDFs:\n' + pdfList + '</div>'
      + '</div>';
  }).join('');
}

function togglePreview(idx) {
  var p = document.getElementById('preview-' + idx);
  var a = document.getElementById('attach-' + idx);
  var show = p.style.display === 'none' || !p.style.display;
  p.style.display = show ? 'block' : 'none';
  a.style.display = show ? 'block' : 'none';
}

async function doMarkSent(idx) {
  var b = bookings[idx];
  if (!b) return;
  var evt = evtName(b.itemName);
  for (var i = 0; i < b.additionalKeys.length; i++) {
    sentKeys[b.additionalKeys[i]] = true;
    await saveFB(b.additionalKeys[i], b.name, evt);
  }
  render();
}
</script>
</body>
</html>
